                  format: uri
      responses:
        "200":
          description: Extension task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"

  # ═══════════════════════════════════════════════════════════════
  # RUNWAY — Dedicated video generation API
  # ═══════════════════════════════════════════════════════════════

  /api/v1/runway/generate:
    post:
      tags: [runway, videos]
      operationId: generateRunwayVideo
      summary: Generate video with Runway AI
      description: |
        Runway's AI video generation. Supports text-to-video and image-to-video.
        Also supports Aleph model (cinematic quality).

        Duration: 5 seconds (720p or 1080p) or 10 seconds (720p only)
        Aspect ratios: 16:9 | 9:16 | 1:1 | 4:3 | 3:4
        Poll status with GET /api/v1/runway/details

        For Aleph model (ultra-cinematic): use model="aleph"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, duration, quality, aspectRatio]
              properties:
                prompt:
                  type: string
                  description: "Scene description. Include camera movement, lighting, style."
                  example: "Slow-motion shot of a waterfall cascading into a crystal pool"
                model:
                  type: string
                  enum: [gen3a_turbo, aleph]
                  default: "gen3a_turbo"
                  description: "gen3a_turbo = fast Runway; aleph = Aleph cinematic model"
                duration:
                  type: integer
                  enum: [5, 10]
                  description: "5s (720p or 1080p) or 10s (720p only)"
                quality:
                  type: string
                  enum: ["720p", "1080p"]
                  description: "720p for all durations; 1080p for 5s only"
                aspectRatio:
                  type: string
                  enum: ["16:9", "9:16", "1:1", "4:3", "3:4"]
                imageUrl:
                  type: string
                  format: uri
                  description: "Optional: reference image for image-to-video"
                waterMark:
                  type: string
                  description: "Optional watermark text. Empty = no watermark."
                callBackUrl:
                  type: string
                  format: uri
            examples:
              text_to_video_hd:
                summary: "Runway text-to-video 1080p"
                value:
                  prompt: "A peacock spreads its feathers in slow motion, macro lens"
                  duration: 5
                  quality: "1080p"
                  aspectRatio: "16:9"
              text_to_video_long:
                summary: "Runway 10-second video"
                value:
                  prompt: "City traffic time-lapse at night, neon reflections on wet streets"
                  duration: 10
                  quality: "720p"
                  aspectRatio: "16:9"
              image_animate:
                summary: "Animate a photo with Runway"
                value:
                  prompt: "Gentle waves ripple across the water"
                  imageUrl: "https://example.com/ocean.jpg"
                  duration: 5
                  quality: "720p"
                  aspectRatio: "16:9"
              aleph_cinematic:
                summary: "Aleph model — ultra-cinematic"
                value:
                  prompt: "Sweeping aerial shot over snow-capped mountains at golden hour"
                  model: "aleph"
                  duration: 5
                  quality: "1080p"
                  aspectRatio: "16:9"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"

  /api/v1/runway/details:
    get:
      tags: [runway, tasks]
      operationId: getRunwayTaskStatus
      summary: Poll Runway task status
      description: |
        Poll after /api/v1/runway/generate or /api/v1/runway/extend.
        When state == "success", videoInfo contains videoUrl and imageUrl (thumbnail).
        expireFlag: 0 = active, 1 = expired (>14 days).
      parameters:
        - name: taskId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunwayTaskStatus"

  /api/v1/runway/extend:
    post:
      tags: [runway]
      operationId: extendRunwayVideo
      summary: Extend a Runway video
      description: "Extend an existing Runway video. Use the original taskId as reference."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId, prompt, duration, quality, aspectRatio]
              properties:
                taskId:
                  type: string
                  description: "Original Runway task ID"
                prompt:
                  type: string
                duration:
                  type: integer
                  enum: [5, 10]
                quality:
                  type: string
                  enum: ["720p", "1080p"]
                aspectRatio:
                  type: string
                callBackUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Extension task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"

  # ═══════════════════════════════════════════════════════════════
  # SUNO — Music generation (full suite)
  # ═══════════════════════════════════════════════════════════════

  /api/v1/generate:
    post:
      tags: [music]
      operationId: generateMusic
      summary: Generate music with Suno AI
      description: |
        Generate AI music. Quick mode: just a prompt. Custom mode: full control.

        QUICK MODE (customMode: false, default):
          Only `prompt` required. Suno auto-generates style, title, everything.
          Best for: "a chill lo-fi beat", "upbeat pop song about summer"

        CUSTOM MODE (customMode: true):
          With instrumental: true → requires style + title
          With instrumental: false → requires style + prompt (lyrics) + title

        MODELS: V4 | V4_5 | V4_5PLUS | V4_5ALL | V5 | V5_5
        V4_5 is the recommended default. V5/V5_5 are newest flagship.

        Character limits:
          V4: prompt ≤3000, style ≤200
          V4_5/V4_5PLUS/V4_5ALL: prompt ≤5000, style ≤1000
          V5/V5_5: prompt ≤5000, style ≤1000
          title: ≤80 (all models)

        Callback stages: text → first (first track done) → complete (all done)
        Generates 2 tracks per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  example: "A calm and relaxing piano track with soft melodies"
                customMode:
                  type: boolean
                  default: false
                instrumental:
                  type: boolean
                  default: false
                model:
                  type: string
                  enum: [V4, V4_5, V4_5PLUS, V4_5ALL, V5, V5_5]
                  default: "V4_5"
                style:
                  type: string
                  description: "Genre/style tags. Required for customMode: true."
                  example: "Lo-fi Hip Hop, Chill, Piano"
                title:
                  type: string
                  maxLength: 80
                  description: "Song title. Required for customMode: true."
                negativeTags:
                  type: string
                  description: "Styles/elements to avoid"
                  example: "Heavy Metal, Upbeat Drums"
                vocalGender:
                  type: string
                  enum: ["m", "f"]
                  description: "m = male vocals, f = female vocals"
                styleWeight:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.5
                weirdnessConstraint:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: "0 = safe/predictable, 1 = experimental/wild"
                audioWeight:
                  type: number
                  minimum: 0
                  maximum: 1
                personaId:
                  type: string
                  description: "Custom voice persona ID (from suno voice API)"
                callBackUrl:
                  type: string
                  format: uri
            examples:
              quick:
                summary: "Quick mode — just a prompt"
                value:
                  prompt: "An upbeat pop song about driving through California in summer"
                  model: "V4_5"
              custom_instrumental:
                summary: "Custom instrumental"
                value:
                  customMode: true
                  instrumental: true
                  style: "Cinematic Orchestral, Epic, Strings"
                  title: "Rise of the Nova"
                  model: "V5"
                  prompt: ""
              custom_with_lyrics:
                summary: "Custom song with lyrics"
                value:
                  customMode: true
                  instrumental: false
                  prompt: "[Verse]\nIn the glow of the city lights\nEvery star feels close tonight"
                  style: "Indie Pop, Dreamy, Female Vocals"
                  title: "City Lights"
                  vocalGender: "f"
                  model: "V4_5"
      responses:
        "200":
          description: Music generation task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"

  /api/v1/generate/extend:
    post:
      tags: [music]
      operationId: extendMusic
      summary: Extend a Suno track
      description: "Add more music to an existing clip. Good for making short songs longer or adding a new section."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: string
                  description: "Task ID of the original music generation"
                prompt:
                  type: string
                  description: "Lyrics or direction for the extension section"
                style:
                  type: string
                continueAt:
                  type: number
                  description: "Time in seconds to branch from. Default: end of track."
                callBackUrl:
                  type: string
