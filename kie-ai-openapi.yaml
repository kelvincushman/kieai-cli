        |---|---|
        | kling-2.6/text-to-video | Kling 2.6 — best all-round text-to-video |
        | kling-3.0/text-to-video | Kling 3.0 — latest, highest quality |
        | kling/v2-1-master-text-to-video | Kling V2.1 Master |
        | kling/v2-1-pro | Kling V2.1 Pro |
        | kling/v2-1-standard | Kling V2.1 Standard |
        | kling/v25-turbo-text-to-video-pro | Kling V2.5 Turbo Pro |
        | sora-2/text-to-video | Sora2 text-to-video |
        | sora-2-pro/text-to-video | Sora2 Pro text-to-video (longer/higher quality) |
        | wan-2.7/text-to-video | Wan 2.7 text-to-video |
        | wan-2.6/text-to-video | Wan 2.6 text-to-video |
        | wan-2.6-flash/text-to-video | Wan 2.6 Flash (fast) |
        | wan-2.5/text-to-video | Wan 2.5 text-to-video |
        | wan-2.2/text-to-video | Wan 2.2 A14B turbo |
        | hailuo/02-text-to-video-pro | Hailuo Pro text-to-video |
        | hailuo/02-text-to-video-standard | Hailuo Standard text-to-video |
        | bytedance/seedance-2 | ByteDance Seedance 2.0 |
        | bytedance/seedance-2-fast | ByteDance Seedance 2.0 Fast |
        | bytedance/seedance-1-5-pro | ByteDance Seedance 1.5 Pro |
        | bytedance/v1-pro-text-to-video | ByteDance V1 Pro text-to-video |
        | bytedance/v1-lite-text-to-video | ByteDance V1 Lite text-to-video |
        | grok-imagine/text-to-video | Grok Imagine text-to-video |
        | happyhorse/text-to-video | HappyHorse text-to-video |

        ### VIDEO MODELS — Image to Video
        | Model string | Description |
        |---|---|
        | kling-2.6/image-to-video | Kling 2.6 image-to-video |
        | kling-3.0/image-to-video | Kling 3.0 image-to-video |
        | kling/v2-1-master-image-to-video | Kling V2.1 Master image-to-video |
        | kling/v25-turbo-image-to-video-pro | Kling V2.5 Turbo Pro image-to-video |
        | sora-2/image-to-video | Sora2 image-to-video |
        | sora-2-pro/image-to-video | Sora2 Pro image-to-video |
        | wan-2.7/image-to-video | Wan 2.7 image-to-video |
        | wan-2.7/reference-to-video | Wan 2.7 reference-to-video |
        | wan-2.6/image-to-video | Wan 2.6 image-to-video |
        | wan-2.6-flash/image-to-video | Wan 2.6 Flash image-to-video |
        | wan-2.5/image-to-video | Wan 2.5 image-to-video |
        | wan-2.2/image-to-video | Wan 2.2 A14B image-to-video turbo |
        | hailuo/02-image-to-video-pro | Hailuo Pro image-to-video |
        | hailuo/02-image-to-video-standard | Hailuo Standard image-to-video |
        | hailuo/2-3-image-to-video-pro | Hailuo 2.3 Pro image-to-video |
        | hailuo/2-3-image-to-video-standard | Hailuo 2.3 Standard image-to-video |
