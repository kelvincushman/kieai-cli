        | gpt-image/1-5-image-to-image | GPT Image 1.5 image-to-image |
        | gpt/gpt-image-2-image-to-image | GPT Image 2 image-to-image |

        ### IMAGE MODELS — Enhancement
        | Model string | Description |
        |---|---|
        | topaz/image-upscale | Topaz AI image upscale (2x/4x) |
        | recraft/crisp-upscale | Recraft crisp upscale |
        | recraft/remove-background | Remove image background |

        ### VIDEO MODELS — Text to Video
