openapi: 3.0.3
info:
  title: KIE.AI — Full API Spec for Nova CLI
  version: "2.0"
  description: |
    KIE.AI is a unified AI creative platform: one API key unlocks 100+ models
    for image generation, video creation, music production, text-to-speech, and
    speech processing — all at 30–80% below official API prices.

    ## SECRET IDENTITY (for Printing Press)
    Nova is an AI creative studio CLI. The user thinks of it as a command that
    makes creative AI things happen — images, videos, music, voiceovers, stems,
    MIDI, lyrics. They should never see raw HTTP. Every command either returns
    a result directly (poll-until-done by default) or prints a taskId for
    async tracking. Nova's compound power: chaining commands across creative
    pipelines (generate image → animate it → add music).

    ## Authentication
    Every request: `Authorization: Bearer <api_key>`
    Key management: https://kie.ai/api-key
    Config: store in env var KIE_API_KEY or ~/.nova/config

    ## API Families (4 distinct base patterns)

    ### 1. Market Models (image/video/audio via createTask)
    POST /api/v1/jobs/createTask  — create task, returns {taskId}
    GET  /api/v1/jobs/recordInfo  — poll status, returns state + resultUrls

    ### 2. Suno Music API (independent endpoints)
    POST /api/v1/generate         — generate music
    POST /api/v1/generate/extend  — extend a track
    POST /api/v1/generate/lyrics  — generate lyrics
    POST /api/v1/generate/cover   — cover an existing song
    POST /api/v1/generate/add-instrumental — add instrumental layer
    POST /api/v1/generate/add-vocals      — add vocals to instrumental
    POST /api/v1/generate/stems           — separate vocals/instruments
    POST /api/v1/generate/midi            — extract MIDI from audio
    POST /api/v1/generate/wav             — convert audio to WAV
    POST /api/v1/generate/sounds          — generate sound effects
    POST /api/v1/generate/music-video     — create music video from track
    POST /api/v1/generate/mashup          — mashup two songs
    GET  /api/v1/tasks/{taskId}           — poll Suno task status

    ### 3. Veo3.1 Video API (dedicated endpoints)
    POST /api/v1/veo3/generate    — generate Veo3.1 video
    POST /api/v1/veo3/extend      — extend a Veo3.1 video
    GET  /api/v1/veo3/details     — get task details
    GET  /api/v1/veo3/1080p       — get 1080P version
    GET  /api/v1/veo3/4k          — get 4K version

    ### 4. Runway Video API (dedicated endpoints)
    POST /api/v1/runway/generate  — generate Runway video
    POST /api/v1/runway/extend    — extend Runway video
    GET  /api/v1/runway/details   — get task details

    ## Rate Limits
    20 requests per 10 seconds. HTTP 429 on excess.

    ## Data Retention
    Generated media: 14 days. Log records: 2 months.
    Download results promptly for long-term access.

servers:
  - url: https://api.kie.ai
    description: KIE.AI production API

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    TaskId:
      type: object
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: success
        data:
          type: object
          properties:
            taskId:
              type: string
              description: "Unique task identifier — use to poll for results"

    MarketTaskStatus:
      type: object
      description: "Response from GET /api/v1/jobs/recordInfo"
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            taskId:
              type: string
            model:
              type: string
              description: "The model string used to create this task"
            state:
              type: string
              enum: [waiting, queuing, generating, success, fail]
            param:
              type: string
              description: "JSON string of original request parameters"
            resultJson:
              type: string
              description: |
                JSON string — parse to get result URLs.
                Image/video tasks: {"resultUrls": ["https://cdn.kie.ai/..."]}
                Result URLs expire after 24 hours.
            failCode:
              type: string
            failMsg:
              type: string
            costTime:
              type: integer
              description: "Processing time in milliseconds"
            completeTime:
              type: integer
              description: "Unix timestamp (ms) of completion"
            createTime:
              type: integer
              description: "Unix timestamp (ms) of creation"
            progress:
              type: integer
              description: "Generation progress 0-100"
            creditsConsumed:
              type: integer

    SunoTaskStatus:
      type: object
      description: "Response from GET /api/v1/tasks/{taskId} for Suno operations"
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            taskId:
              type: string
            state:
              type: string
              enum: [pending, generating, success, fail]
            clips:
              type: array
              description: "Generated music tracks (usually 2 per request)"
              items:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  audio_url:
                    type: string
                    format: uri
                    description: "Direct MP3 download URL"
                  image_url:
                    type: string
                    format: uri
                    description: "Cover art URL"
                  duration:
                    type: number
                    description: "Track duration in seconds"
                  tags:
                    type: string
                    description: "Style tags applied"
                  model_name:
                    type: string

    RunwayTaskStatus:
      type: object
      description: "Response from GET /api/v1/runway/details"
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            taskId:
              type: string
            state:
              type: string
              enum: [wait, queueing, generating, success, fail]
            generateTime:
              type: string
            videoInfo:
              type: object
              properties:
                videoId:
                  type: string
                videoUrl:
                  type: string
                  format: uri
                imageUrl:
                  type: string
                  format: uri
                  description: "Thumbnail/preview image"
            expireFlag:
              type: integer
              enum: [0, 1]
              description: "0 = active, 1 = expired (>14 days)"

    Veo3TaskStatus:
      type: object
      description: "Response from GET /api/v1/veo3/details"
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            taskId:
              type: string
            successFlag:
              type: integer
              enum: [0, 1, 2, 3]
              description: "0=generating, 1=success, 2=failed, 3=generation failed"
            videoUrl:
              type: string
              format: uri
            imageUrl:
              type: string
              format: uri
              description: "Thumbnail"

tags:
  - name: images
    description: "Image generation and editing — all use POST /api/v1/jobs/createTask"
  - name: videos
    description: "Video generation — Market models use createTask; Runway and Veo3.1 have dedicated endpoints"
  - name: veo3
    description: "Google Veo3.1 video generation — dedicated API family"
  - name: runway
    description: "Runway AI video generation — dedicated API family"
  - name: music
    description: "Suno AI music generation, editing, and processing"
  - name: speech
    description: "ElevenLabs text-to-speech, speech-to-text, audio isolation, dialogue"
  - name: tasks
    description: "Task status polling — universal task management"

paths:

  # ═══════════════════════════════════════════════════════════════
  # MARKET MODELS — Image & Video & Audio (unified createTask)
  # ═══════════════════════════════════════════════════════════════

  /api/v1/jobs/createTask:
    post:
      tags: [images, videos, speech]
      operationId: createMarketTask
      summary: Create image, video, or audio task (Market models)
      description: |
        Unified endpoint for all Market-category AI models. Pass `model` to select
        which model runs. Returns `taskId` — poll /api/v1/jobs/recordInfo for results.

        ## ALL AVAILABLE MODEL STRINGS

