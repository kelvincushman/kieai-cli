        ### VIDEO MODELS — Upscale & Enhancement
        | Model string | Description |
        |---|---|
        | topaz/video-upscale | Topaz AI video upscale |
        | grok-imagine/video-upscale | Grok Imagine video upscale |
        | grok-imagine/video-extend | Grok Imagine video extend |

        ### AUDIO MODELS — ElevenLabs (via createTask)
        | Model string | Description |
        |---|---|
        | elevenlabs/text-to-speech-turbo-2-5 | TTS Turbo v2.5 — fast, high quality |
        | elevenlabs/text-to-speech-multilingual-v2 | TTS Multilingual v2 — 29 languages |
        | elevenlabs/text-to-dialogue-v3 | Dialogue generation v3 |
        | elevenlabs/audio-isolation | Audio isolation / noise removal |
        | elevenlabs/speech-to-text | Speech transcription |
        | elevenlabs/sound-effect-v2 | Sound effect generation |

        ### AUDIO MODELS — Infinitalk
        | Model string | Description |
        |---|---|
        | infinitalk/from-audio | Infinitalk audio processing |

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model:
                  type: string
                  description: "Model identifier (see full list in description)"
                  example: "flux-2/pro-text-to-image"
                callBackUrl:
                  type: string
                  format: uri
                  description: "Webhook URL — POST'd on task completion. Use in production to avoid polling."
                input:
                  type: object
                  description: |
                    Model-specific parameters. Common fields by category:

                    TEXT-TO-IMAGE:
                      prompt (string, required) — image description
                      aspect_ratio (string) — "1:1"|"16:9"|"9:16"|"4:3"|"3:4"|"3:2"|"2:3"
                      resolution (string) — "1K"|"2K"|"4K" (model-dependent)
                      nsfw_checker (boolean) — enable safety filter
                      negative_prompt (string) — elements to exclude

                    IMAGE-TO-IMAGE (adds):
                      image_url (string, uri) — source image URL
                      image_strength (number, 0-1) — how much to preserve original

                    TEXT-TO-VIDEO:
                      prompt (string, required) — scene description
                      aspect_ratio (string) — "16:9"|"9:16"|"1:1"
                      duration (string) — "5"|"10" seconds
                      sound (boolean) — include audio (Kling 3.0+)

                    IMAGE-TO-VIDEO (adds):
                      image_url (string, uri) — starting frame
                      negative_prompt (string)

                    VIDEO-TO-VIDEO (adds):
                      video_url (string, uri) — source video
                      prompt (string) — editing instructions

                    TOPAZ UPSCALE:
                      image_url or video_url (string, uri) — source media
                      scale (integer, 2 or 4) — upscale factor

                    RECRAFT:
                      image_url (string, uri) — source image

                    ELEVENLABS TTS:
                      text (string, required) — text to synthesize
                      voice_id (string) — ElevenLabs voice ID
                      model_id (string) — "eleven_turbo_v2_5"|"eleven_multilingual_v2"
                      stability (number, 0-1) — voice stability
                      similarity_boost (number, 0-1) — voice similarity

                    ELEVENLABS STT:
                      audio_url (string, uri) — audio to transcribe
                      language_code (string) — BCP-47 language code

                    ELEVENLABS SOUND EFFECT:
                      text (string, required) — sound description
                      duration_seconds (number, 0.5-22)
                  additionalProperties: true
            examples:
              image_flux_pro:
                summary: "High-quality image with Flux-2 Pro"
                value:
                  model: "flux-2/pro-text-to-image"
                  input:
                    prompt: "Cinematic portrait of a red fox in a snowy forest, golden hour"
                    aspect_ratio: "3:2"
                    resolution: "1K"
              image_ideogram:
                summary: "Ideogram V3 with typography"
                value:
                  model: "ideogram/v3-text-to-image"
                  input:
                    prompt: "A minimalist poster with the word NOVA in bold sans-serif, dark background"
                    aspect_ratio: "9:16"
              image_gpt2:
                summary: "GPT Image 2 text-to-image"
                value:
                  model: "gpt/gpt-image-2-text-to-image"
                  input:
                    prompt: "Product photo: a sleek black smartwatch on white marble"
                    aspect_ratio: "1:1"
              image_to_image_flux:
                summary: "Transform existing image with Flux"
                value:
                  model: "flux-2/pro-image-to-image"
                  input:
                    prompt: "Make it look like an oil painting in the style of Rembrandt"
                    image_url: "https://example.com/photo.jpg"
                    image_strength: 0.7
              video_kling_text:
                summary: "Kling 2.6 text-to-video"
                value:
                  model: "kling-2.6/text-to-video"
                  input:
                    prompt: "A lone astronaut walks across a red Martian landscape at sunset"
                    aspect_ratio: "16:9"
                    duration: "5"
              video_sora2:
                summary: "Sora2 text-to-video"
                value:
                  model: "sora-2/text-to-video"
                  input:
                    prompt: "Hyperrealistic drone shot flying over a tropical rainforest"
                    aspect_ratio: "16:9"
                    duration: "10"
              video_kling_image_animate:
                summary: "Animate a photo with Kling"
                value:
                  model: "kling-2.6/image-to-video"
                  input:
                    prompt: "The person slowly turns and smiles at the camera"
                    image_url: "https://example.com/portrait.jpg"
                    duration: "5"
              video_wan_27:
                summary: "Wan 2.7 image-to-video"
                value:
                  model: "wan-2.7/image-to-video"
                  input:
                    prompt: "Gentle waves ripple across the water surface"
                    image_url: "https://example.com/lake.jpg"
              upscale_image:
                summary: "Topaz 4x image upscale"
                value:
                  model: "topaz/image-upscale"
                  input:
                    image_url: "https://example.com/small.jpg"
                    scale: 4
              remove_background:
                summary: "Remove image background"
                value:
                  model: "recraft/remove-background"
                  input:
                    image_url: "https://example.com/product.jpg"
              elevenlabs_tts:
                summary: "ElevenLabs text-to-speech"
                value:
                  model: "elevenlabs/text-to-speech-turbo-2-5"
                  input:
                    text: "Welcome to Nova — your AI creative studio."
                    voice_id: "21m00Tcm4TlvDq8ikWAM"
                    stability: 0.5
                    similarity_boost: 0.75
              elevenlabs_stt:
                summary: "ElevenLabs speech-to-text"
                value:
                  model: "elevenlabs/speech-to-text"
                  input:
                    audio_url: "https://example.com/recording.mp3"
                    language_code: "en"
              elevenlabs_sound:
                summary: "Generate a sound effect"
                value:
                  model: "elevenlabs/sound-effect-v2"
                  input:
                    text: "Dramatic cinematic explosion with debris"
                    duration_seconds: 3.0
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"
        "401":
          description: Invalid or missing API key
        "429":
          description: Rate limit exceeded

  /api/v1/jobs/recordInfo:
    get:
      tags: [tasks]
      operationId: getMarketTaskStatus
      summary: Poll Market task status and results
      description: |
        Poll after any createTask call (image/video/speech).
        Parse `resultJson` as JSON when state == "success":
          Image/video: {"resultUrls": ["https://..."]}
        Polling strategy: 2s → 4s → 8s → 16s → 30s max. Timeout at 15 min.
        Download result URLs within 24h (URLs expire). Media deleted after 14 days.
      parameters:
        - name: taskId
          in: query
          required: true
          schema:
            type: string
          example: "task_flux-2_1765175072483"
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketTaskStatus"
              examples:
                generating:
                  value:
                    code: 200
                    data:
                      taskId: "task_flux-2_1765175072483"
                      state: "generating"
                      progress: 60
                success:
                  value:
                    code: 200
                    data:
                      taskId: "task_flux-2_1765175072483"
                      state: "success"
                      resultJson: '{"resultUrls":["https://cdn.kie.ai/img/abc123.jpg"]}'
                      creditsConsumed: 30
                      costTime: 12500

  # ═══════════════════════════════════════════════════════════════
  # VEO3.1 — Dedicated video generation API
  # ═══════════════════════════════════════════════════════════════

  /api/v1/veo3/generate:
    post:
      tags: [veo3, videos]
      operationId: generateVeo3Video
      summary: Generate video with Google Veo3.1
      description: |
        Google's Veo 3.1 — high-fidelity video generation with support for
        text-to-video and image-to-video. Supports 16:9 for 1080P HD export.

        Models: veo3 (quality) | veo3_fast (speed)
        After success, optionally call GET /api/v1/veo3/1080p for HD version.
        Veo3.1 generates videos with audio by default.

        successFlag values: 0=generating, 1=success, 2=failed, 3=gen_failed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  description: "Detailed scene description. Include actions, lighting, style, camera movement."
                  example: "A majestic bald eagle soars over a misty Pacific Northwest forest at dawn"
                model:
                  type: string
                  enum: [veo3, veo3_fast]
                  default: "veo3"
                  description: "veo3 = quality (slower), veo3_fast = speed (cheaper)"
                aspectRatio:
                  type: string
                  enum: ["16:9", "9:16", "1:1", "4:3", "3:4"]
                  default: "16:9"
                  description: "Use 16:9 to unlock 1080P HD export"
                imageUrl:
                  type: string
                  format: uri
                  description: "Optional: animate this image (image-to-video)"
                callBackUrl:
                  type: string
                  format: uri
            examples:
              text_to_video:
                value:
                  prompt: "Cinematic timelapse of the Milky Way rising over a desert landscape, 4K quality"
                  model: "veo3"
                  aspectRatio: "16:9"
              image_to_video:
                value:
                  prompt: "The flowers gently sway in a breeze"
                  imageUrl: "https://example.com/flowers.jpg"
                  model: "veo3_fast"
                  aspectRatio: "16:9"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskId"

  /api/v1/veo3/details:
    get:
      tags: [veo3, tasks]
      operationId: getVeo3TaskStatus
      summary: Poll Veo3.1 task status
      description: |
        Poll after /api/v1/veo3/generate.
        successFlag: 0=generating, 1=success, 2=failed, 3=generation failed
      parameters:
        - name: taskId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Veo3TaskStatus"

  /api/v1/veo3/1080p:
    get:
      tags: [veo3]
      operationId: getVeo3HD
      summary: Get 1080P version of completed Veo3.1 video
      description: |
        After a 16:9 Veo3.1 video succeeds, call this to get the 1080P HD version.
        Wait a few minutes after video completion before calling — HD processing
        takes additional time.
      parameters:
        - name: taskId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 1080P video URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      videoUrl:
                        type: string
                        format: uri

  /api/v1/veo3/4k:
    post:
      tags: [veo3]
      operationId: getVeo3_4K
      summary: Get 4K version of completed Veo3.1 video
      description: "Upscale a completed Veo3.1 video to 4K resolution."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
