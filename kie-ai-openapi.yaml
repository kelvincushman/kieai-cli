          description: Lyrics with timestamps
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      lyrics:
                        type: array
                        items:
                          type: object
                          properties:
                            word:
                              type: string
                            startTime:
                              type: number
                            endTime:
                              type: number

  /api/v1/generate/persona:
    post:
      tags: [music]
      operationId: generatePersona
      summary: Create a Suno voice persona
      description: "Create a custom AI voice persona for use in future Suno music generations via personaId."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, style]
              properties:
                name:
                  type: string
                  description: "Name for this persona"
                style:
                  type: string
                  description: "Voice style description"
                  example: "Warm, raspy baritone with a slight Southern drawl"
                vocalGender:
                  type: string
                  enum: ["m", "f"]
      responses:
        "200":
          description: Persona created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      personaId:
                        type: string
                      personaModel:
                        type: string

  /api/v1/tasks/{taskId}:
    get:
      tags: [tasks, music]
      operationId: getSunoTaskStatus
      summary: Poll Suno music task status
      description: |
        Poll Suno music tasks (use /api/v1/jobs/recordInfo for Market model tasks).
        When state == "success", clips[] contains audio_url (MP3) and image_url (cover art).
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suno task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SunoTaskStatus"
